<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhập điểm</title>
    <link rel="stylesheet" href="css/nhapdiem.css">
</head>
<body>
    <header>
        <nav>
            <a href="trang_chu.html">Trang chủ</a>
            <a href="quanlylop.html">Quản lý lớp</a>
            <a href="danhsachlop.html">Danh sách lớp</a>
            <a href="nhapdiem.html">Nhập điểm</a>
            <a href="thongketra.html">Thống kê/Tra cứu</a>
        </nav>
    </header>
    <div class="container">
        <h1>Nhập điểm</h1>
        <form id="enter_score_form">
            <input type="text" name="ma_lop" placeholder="Mã lớp" required>
            <input type="text" name="ma_sv" placeholder="Mã SV" required>
            <input type="number" step="0.1" name="diem_chuyen_can" placeholder="Điểm chuyên cần (0-10)" required>
            <input type="number" step="0.1" name="diem_giua_ky_1" placeholder="Điểm giữa kỳ 1 (0-10)" required>
            <input type="number" step="0.1" name="diem_giua_ky_2" placeholder="Điểm giữa kỳ 2 (0-10, nếu 3 tín chỉ)">
            <input type="number" step="0.1" name="diem_thao_luan" placeholder="Điểm thảo luận (0-10)" required>
            <input type="number" step="0.1" name="diem_cuoi_ky" placeholder="Điểm cuối kỳ (0-10)" required>
            <button type="submit">Nhập điểm</button>
        </form>
        <h3>Chỉnh sửa điểm</h3>
        <form id="edit_score_form">
            <input type="text" name="ma_sv" placeholder="Mã SV" required>
            <button type="button" onclick="loadScore()">Tìm điểm</button>
            <div id="score_info" style="display: none;">
                <input type="number" step="0.1" name="diem_chuyen_can" placeholder="Điểm chuyên cần">
                <input type="number" step="0.1" name="diem_giua_ky_1" placeholder="Điểm giữa kỳ 1">
                <input type="number" step="0.1" name="diem_giua_ky_2" placeholder="Điểm giữa kỳ 2">
                <input type="number" step="0.1" name="diem_thao_luan" placeholder="Điểm thảo luận">
                <input type="number" step="0.1" name="diem_cuoi_ky" placeholder="Điểm cuối kỳ">
                <button type="submit">Cập nhật</button>
            </div>
        </form>
        <h3>Xóa điểm</h3>
        <form id="delete_score_form">
            <input type="text" name="ma_sv" placeholder="Mã SV" required>
            <button type="submit">Xóa</button>
        </form>
        <h3>Tính điểm tổng kết</h3>
        <form id="calculate_score_form">
            <input type="text" name="ma_lop" placeholder="Mã lớp" required>
            <button type="submit">Tính điểm</button>
        </form>
    </div>
    <script src="js/nhapdiem.js"></script>
</body>
</html>
