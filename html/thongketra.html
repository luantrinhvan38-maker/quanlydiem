<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thống kê/Tra cứu</title>
    <link rel="stylesheet" href="css/thongketra.css">
</head>
<body>
    <header>
        <nav>
            <a href="trang_chu.html">Trang chủ</a>
            <a href="quanlylop.html">Quản lý lớp</a>
            <a href="danhsachlop.html">Danh sách lớp</a>
            <a href="nhapdiem.html">Nhập điểm</a>
            <a href="thongketra.html">Thống kê/Tra cứu</a>
        </nav>
    </header>
    <div class="container">
        <h1>Thống kê/Tra cứu</h1>
        <h3>Tra cứu theo mã sinh viên</h3>
        <form id="search_student_form">
            <input type="text" name="ma_sv" placeholder="Mã SV" required>
            <button type="submit">Tra cứu</button>
        </form>
        <div id="student_result"></div>
        <h3>Tra cứu theo mã lớp</h3>
        <form id="search_class_form">
            <input type="text" name="ma_lop" placeholder="Mã lớp" required>
            <button type="submit">Tra cứu</button>
        </form>
        <table id="class_result">
            <thead>
                <tr>
                    <th>Mã SV</th>
                    <th>Tên SV</th>
                    <th>Điểm chuyên cần</th>
                    <th>Điểm giữa kỳ</th>
                    <th>Điểm thảo luận</th>
                    <th>Điểm cuối kỳ</th>
                    <th>Điểm tổng kết</th>
                    <th>Xếp loại</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <h3>Thống kê lớp</h3>
        <form id="statistics_form">
            <input type="text" name="ma_lop" placeholder="Mã lớp" required>
            <button type="submit">Thống kê</button>
        </form>
        <div id="statistics_result"></div>
    </div>
    <script src="js/thongketra.js"></script>
</body>
</html>
